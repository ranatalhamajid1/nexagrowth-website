        <div class="input-group"><label>Type</label><select id="genType" class="select-field"><option value="paragraphs" selected>Paragraphs</option><option value="sentences">Sentences</option><option value="words">Words</option></select></div>

  <script>
  const paragraphsList=[
    "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Duis vel sodales diam. Proin a est eget dolor efficitur rhoncus. Phasellus hendrerit felis eu feugiat tristique. Nunc accumsan leo nec felis elementum, sed iaculis eros gravida. Nam porta tincidunt justo vel eleifend. Curabitur vitae erat eu purus varius commodo et convallis ligula. Sed ultrices ante ut ligula dictum tincidunt.",
    "Mauris pulvinar, nunc non tristique semper, nisl lorem porta mi, a facilisis erat leo non magna. Vivamus elementum hendrerit massa at efficitur. Cras cursus ligula ut ipsum tristique lacinia. Etiam ultrices ipsum non scelerisque aliquet. Praesent id interdum quam. Sed lacinia hendrerit elementum. Aliquam nec arcu egestas lorem facilisis tincidunt sit amet sed ex.",
    "Proin sed pretium purus, ac imperdiet leo. Cras accumsan purus sed tellus cursus tristique. Phasellus pellentesque metus ut nisi bibendum gravida. Vivamus vitae felis elementum, auctor ligula non, porta lorem. Aliquam eu justo in augue elementum condimentum. Phasellus quis vulputate ipsum. Integer tempus felis et eleifend porta.",
    "Vivamus et sodales elit, id accumsan leo. Fusce at magna quis ex facilisis consequat id ut metus. Curabitur et dolor scelerisque, facilisis neque vitae, tempor elit. Sed sodales lorem ipsum, rhoncus placerat eros condimentum vitae. Vestibulum pulvinar metus eget eros efficitur elementum. Proin hendrerit dictum velit, eget tristique ex efficitur non.",
    "Integer sed ipsum quis quam vehicula consequat. Fusce sit amet mi magna. Morbi pellentesque nunc et ante scelerisque sollicitudin. Curabitur hendrerit scelerisque purus ac sodales. Aliquam elementum, urna vitae convallis accumsan, tortor lorem elementum ex, in luctus nunc lacus quis libero. Mauris consequat felis ut neque sodales tempus."
  ];
  function generate(){
    const type=document.getElementById('genType').value;
    const count=parseInt(document.getElementById('genCount').value)||5;
    const output=document.getElementById('outputText');
    if(type==='paragraphs'){
      let res=[];
      for(let i=0;i<count;i++){res.push(paragraphsList[i%paragraphsList.length])}
      output.value=res.join('\n\n');
    }else if(type==='sentences'){
      let allSentences=[];
      paragraphsList.forEach(p=>{allSentences.push(...p.split('. '))});
      let res=[];
      for(let i=0;i<count;i++){res.push(allSentences[i%allSentences.length]+'.')}
      output.value=res.join(' ');
    }else{
      let allWords=[];
      paragraphsList.forEach(p=>{allWords.push(...p.split(' '))});
      let res=[];
      for(let i=0;i<count;i++){res.push(allWords[i%allWords.length].replace(/[.,]/g,''))}
      output.value=res.join(' ');
    }
  }
  generate();
  </script>
