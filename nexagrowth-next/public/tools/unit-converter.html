    <div class="tool-hero"><div class="tool-icon">⚖️</div><h1>Unit <em>Converter</em></h1><p>Convert metrics in real-time. Toggle between Length, Weight, and Temperature categories.</p></div>
    <div class="tool-card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchCategory('length')">Length</button>
        <button class="tab-btn" onclick="switchCategory('weight')">Weight</button>
        <button class="tab-btn" onclick="switchCategory('temp')">Temperature</button>
      </div>
      <div class="conv-grid">
        <div class="input-group">
          <label>From Value</label>
          <input type="number" id="valFrom" class="input-field" value="1" oninput="convert()">
          <select id="unitFrom" class="select-field" style="margin-top:8px" onchange="convert()"></select>
        </div>
        <div class="equal-sign">=</div>
        <div class="input-group">
          <label>To Value</label>
          <input type="number" id="valTo" class="input-field" readonly style="background:var(--glass);cursor:default">
          <select id="unitTo" class="select-field" style="margin-top:8px" onchange="convert()"></select>
        </div>
      </div>

  <script src="tools.js"></script>
  <script>
  let currentCategory='length';
  const units={
    length:{
      m:{name:'Meter (m)',factor:1},
      cm:{name:'Centimeter (cm)',factor:0.01},
      km:{name:'Kilometer (km)',factor:1000},
      inch:{name:'Inch (in)',factor:0.0254},
      ft:{name:'Foot (ft)',factor:0.3048},
      yd:{name:'Yard (yd)',factor:0.9144},
      mi:{name:'Mile (mi)',factor:1609.344}
    },
    weight:{
      kg:{name:'Kilogram (kg)',factor:1},
      g:{name:'Gram (g)',factor:0.001},
      lb:{name:'Pound (lb)',factor:0.45359237},
      oz:{name:'Ounce (oz)',factor:0.028349523}
    },
    temp:{
      c:{name:'Celsius (°C)'},
      f:{name:'Fahrenheit (°F)'},
      k:{name:'Kelvin (K)'}
    }
  };
  const valFrom=document.getElementById('valFrom'),valTo=document.getElementById('valTo'),unitFrom=document.getElementById('unitFrom'),unitTo=document.getElementById('unitTo');
  function switchCategory(cat){
    currentCategory=cat;
    document.querySelectorAll('.tab-btn').forEach(btn=>{
      btn.classList.toggle('active',btn.textContent.toLowerCase()===cat||(btn.textContent.includes('Temp')&&cat==='temp'));
    });
    populateDropdowns();
    convert();
  }
  function populateDropdowns(){
    unitFrom.innerHTML='';unitTo.innerHTML='';
    const catUnits=units[currentCategory];
    let i=0;
    for(let k in catUnits){
      const opt1=document.createElement('option');opt1.value=k;opt1.textContent=catUnits[k].name;
      const opt2=document.createElement('option');opt2.value=k;opt2.textContent=catUnits[k].name;
      if(i===0)opt1.selected=true;
      if(i===1)opt2.selected=true;
      unitFrom.appendChild(opt1);
      unitTo.appendChild(opt2);
      i++;
    }
  }
  function convert(){
    const val=parseFloat(valFrom.value);
    if(isNaN(val)){valTo.value='';return}
    const uFrom=unitFrom.value,uTo=unitTo.value;
    if(uFrom===uTo){valTo.value=val;return}
    if(currentCategory==='temp'){
      let tempInC=0;
      if(uFrom==='c')tempInC=val;
      else if(uFrom==='f')tempInC=(val-32)*5/9;
      else if(uFrom==='k')tempInC=val-273.15;
      let finalVal=0;
      if(uTo==='c')finalVal=tempInC;
      else if(uTo==='f')finalVal=(tempInC*9/5)+32;
      else if(uTo==='k')finalVal=tempInC+273.15;
      valTo.value=finalVal.toFixed(4);
    }else{
      const meters=val*units[currentCategory][uFrom].factor;
      const result=meters/units[currentCategory][uTo].factor;
      valTo.value=result.toFixed(6).replace(/\.?0+$/,'');
    }
  }
  populateDropdowns();
  convert();
  </script>
