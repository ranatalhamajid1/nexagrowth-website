    <div class="tool-hero"><div class="tool-icon">#️⃣</div><h1>Hashtag <em>Generator</em></h1><p>Find trending hashtags for your social media content. Enter keywords to get recommendations.</p></div>
    <div class="tool-card">
      <div class="search-row">
        <input type="text" id="keyword" class="input-field" placeholder="e.g. marketing, tech, fitness, travel..." value="marketing" onkeydown="if(event.key==='Enter')generateTags()">
        <button class="btn-primary" onclick="generateTags()">Generate</button>
      </div>
      <div class="tool-actions" style="margin-bottom:16px;display:none" id="actionsRow">
        <button class="btn-secondary" onclick="copyAllTags(this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy All</button>

  <footer class="tool-footer"><div class="container"><p>&copy; 2025 NexaGrowth. All rights reserved.</p></div></footer>
  <script src="tools.js"></script>
  <script>
  const tagDb={
    marketing:['#marketing','#digitalmarketing','#marketingstrategy','#branding','#seo','#socialmedia','#growthhacking','#contentmarketing','#business','#entrepreneur'],
    tech:['#tech','#technology','#innovation','#coding','#programming','#software','#developer','#ai','#machinelearning','#webdev'],
    fitness:['#fitness','#gym','#workout','#motivation','#health','#fit','#fitfam','#training','#lifestyle','#healthy'],
    travel:['#travel','#wanderlust','#nature','#adventure','#travelgram','#instatravel','#trip','#vacation','#explore','#photography'],
    fashion:['#fashion','#style','#ootd','#model','#love','#beauty','#instagood','#shopping','#outfit','#instafashion'],
    food:['#food','#foodie','#instafood','#foodporn','#delicious','#yummy','#foodphotography','#dinner','#cooking','#healthyfood'],
    art:['#art','#artist','#drawing','#illustration','#painting','#artwork','#sketch','#digitalart','#creative','#instaart']
  };
  function generateTags(){
    const kw=document.getElementById('keyword').value.trim().toLowerCase();
    const container=document.getElementById('tagsContainer');
    const actionsRow=document.getElementById('actionsRow');
    container.innerHTML='';
    if(!kw){actionsRow.style.display='none';return}
    let tags=tagDb[kw];
    if(!tags){
      const cleanKw=kw.replace(/\s+/g,'');
      tags=[`#${cleanKw}`,`#${cleanKw}life`,`#${cleanKw}community`,`#${cleanKw}tips`,`#${cleanKw}trending`,`#${cleanKw}online`,`#best${cleanKw}`,`#love${cleanKw}`,`#instafollow`,`#trendingnow`];
    }
    tags.forEach(t=>{
      const badge=document.createElement('div');
      badge.className='tag-badge';
      badge.innerHTML=`${t} <span>📋</span>`;
      badge.onclick=()=>copyToClipboard(t,badge);
      container.appendChild(badge);
    });
    actionsRow.style.display='block';
  }
  function copyAllTags(btn){
    const list=Array.from(document.querySelectorAll('.tag-badge')).map(el=>el.textContent.replace(' 📋','')).join(' ');
    copyToClipboard(list,btn);
  }
  generateTags();
  </script>
