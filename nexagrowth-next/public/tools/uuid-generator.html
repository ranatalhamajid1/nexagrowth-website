  <script>
  function uuidv4() {
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
    );
  }
  function generateUUIDs(){
    const count=parseInt(document.getElementById('quantity').value)||5;
    const caseStyle=document.getElementById('letterCase').value;
    const list=[];
    for(let i=0;i<count;i++){
      let uuid=uuidv4();
      if(caseStyle==='upper')uuid=uuid.toUpperCase();
      list.push(uuid);
    }
    document.getElementById('outputText').value=list.join('\n');
  }
  generateUUIDs();
  </script>
