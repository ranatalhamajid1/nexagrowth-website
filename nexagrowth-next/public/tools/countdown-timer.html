    <div class="tool-hero"><div class="tool-icon">⏱️</div><h1>Countdown <em>Timer</em></h1><p>Set a custom countdown timer. Start, pause, or reset, and get a sound alert when time runs out.</p></div>
    <div class="tool-card">
      <div class="inputs-row" id="timerInputs">
        <div class="time-input-group"><label>Hours</label><input type="number" id="hrs" class="time-field" min="0" max="99" value="0" placeholder="00"></div>
        <div class="time-input-group"><label>Mins</label><input type="number" id="mins" class="time-field" min="0" max="59" value="5" placeholder="00"></div>
        <div class="time-input-group"><label>Secs</label><input type="number" id="secs" class="time-field" min="0" max="59" value="0" placeholder="00"></div>
      </div>
      <div class="timer-display" id="timerDisplay">00:05:00</div>
      <div class="timer-controls">
        <button class="btn-primary" id="startBtn" onclick="startTimer()">Start</button>
        <button class="btn-secondary" id="pauseBtn" onclick="pauseTimer()" disabled>Pause</button>
        <button class="btn-secondary" onclick="resetTimer()">Reset</button>
      </div>

  <script src="tools.js"></script>
  <script>
  let timerId=null,totalSeconds=0,isRunning=false;
  const timerDisplay=document.getElementById('timerDisplay'),inputs=document.getElementById('timerInputs');
  const startBtn=document.getElementById('startBtn'),pauseBtn=document.getElementById('pauseBtn');
  const hField=document.getElementById('hrs'),mField=document.getElementById('mins'),sField=document.getElementById('secs');
  function formatTime(val){return String(val).padStart(2,'0')}
  function updateDisplay(secCount){
    const h=Math.floor(secCount/3600);
    const m=Math.floor((secCount%3600)/60);
    const s=secCount%60;
    timerDisplay.textContent=`${formatTime(h)}:${formatTime(m)}:${formatTime(s)}`;
  }
  function playAlert(){
    try{
      const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      const osc=audioCtx.createOscillator();
      const gainNode=audioCtx.createGain();
      osc.connect(gainNode);gainNode.connect(audioCtx.destination);
      osc.type='sine';osc.frequency.value=880;
      gainNode.gain.setValueAtTime(0.5,audioCtx.currentTime);
      osc.start();
      setTimeout(()=>{osc.stop();audioCtx.close()},1000);
    }catch(e){console.warn('AudioContext not allowed or failed: '+e.message)}
  }
  function startTimer(){
    if(!isRunning){
      const hrs=parseInt(hField.value)||0;
      const mins=parseInt(mField.value)||0;
      const secs=parseInt(sField.value)||0;
      totalSeconds=hrs*3600+mins*60+secs;
      if(totalSeconds<=0)return;
      isRunning=true;
      inputs.style.display='none';
      startBtn.disabled=true;pauseBtn.disabled=false;
      timerId=setInterval(()=>{
        totalSeconds--;
        updateDisplay(totalSeconds);
        if(totalSeconds<=0){
          clearInterval(timerId);
          playAlert();
          resetTimer();
        }
      },1000);
    }
  }
  function pauseTimer(){
    if(isRunning){
      clearInterval(timerId);
      isRunning=false;
      startBtn.disabled=false;pauseBtn.disabled=true;
    }
  }
  function resetTimer(){
    clearInterval(timerId);
    isRunning=false;
    inputs.style.display='flex';
    startBtn.disabled=false;pauseBtn.disabled=true;
    const hrs=parseInt(hField.value)||0;
    const mins=parseInt(mField.value)||0;
    const secs=parseInt(sField.value)||0;
    updateDisplay(hrs*3600+mins*60+secs);
  }
  </script>
