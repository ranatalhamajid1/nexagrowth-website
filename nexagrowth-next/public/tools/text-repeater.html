    <div class="tool-hero"><div class="tool-icon">🔁</div><h1>Text <em>Repeater</em></h1><p>Repeat any string, word, or sentence N times. Customize separators (new line, space, comma) and generate instantly.</p></div>
    <div class="tool-card">
      <div class="options-row">
        <div class="input-group"><label>Text to Repeat</label><input type="text" id="repeatText" class="input-field" placeholder="Love" value="Love"></div>
        <div class="input-group"><label>Repetitions</label><input type="number" id="repeatCount" class="input-field" value="10" min="1" max="10000"></div>
        <div class="input-group">
          <label>Separator</label>
          <select id="separator" class="select-field">
            <option value="space">Space</option>
            <option value="newline" selected>New Line</option>
            <option value="comma">Comma</option>
            <option value="none">None</option>
          </select>
        </div>

      <div class="tool-actions" style="margin-top:16px">
        <button class="btn-primary" onclick="repeat()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>Repeat Text</button>
        <button class="btn-secondary" onclick="copyToClipboard(document.getElementById('outputText').value,this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy Output</button>

  <script src="tools.js"></script>
  <script>
  function repeat(){
    const txt=document.getElementById('repeatText').value;
    const count=parseInt(document.getElementById('repeatCount').value)||1;
    const sepType=document.getElementById('separator').value;
    const output=document.getElementById('outputText');
    if(!txt){output.value='';return}
    let sep=' ';
    if(sepType==='newline')sep='\n';
    else if(sepType==='comma')sep=', ';
    else if(sepType==='none')sep='';
    const arr=new Array(count).fill(txt);
    output.value=arr.join(sep);
  }
  repeat();
  </script>
