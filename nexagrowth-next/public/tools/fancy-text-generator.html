  <script src="tools.js"></script>
  <script>
  const maps={
    bold:'рқҗҖрқҗҒрқҗӮрқҗғрқҗ„рқҗ…рқҗҶрқҗҮрқҗҲрқҗүрқҗҠрқҗӢрқҗҢрқҗҚрқҗҺрқҗҸрқҗҗрқҗ‘рқҗ’рқҗ“рқҗ”рқҗ•рқҗ–рқҗ—рқҗҳрқҗҷрқҗҡрқҗӣрқҗңрқҗқрқҗһрқҗҹрқҗ рқҗЎрқҗўрқҗЈрқҗӨрқҗҘрқҗҰрқҗ§рқҗЁрқҗ©рқҗӘрқҗ«рқҗ¬рқҗӯрқҗ®рқҗҜрқҗ°рқҗұрқҗІрқҗірқҹҺрқҹҸрқҹҗрқҹ‘рқҹ’рқҹ“рқҹ”рқҹ•рқҹ–рқҹ—',
    doubleStruck:'рқ”ёрқ”№в„Ӯрқ”»рқ”јрқ”Ҫрқ”ҫв„Қрқ•Җрқ•Ғрқ•Ӯрқ•ғрқ•„в„•рқ•Ҷв„ҷв„ҡв„қрқ•Ҡрқ•Ӣрқ•Ңрқ•Қрқ•Һрқ•Ҹрқ•җв„Өрқ•’рқ•“рқ•”рқ••рқ•–рқ•—рқ•ҳрқ•ҷрқ•ҡрқ•ӣрқ•ңрқ•қрқ•һрқ•ҹрқ• рқ•Ўрқ•ўрқ•Јрқ•Өрқ•Ҙрқ•Ұрқ•§рқ•Ёрқ•©рқ•Әрқ•«рқҹҳрқҹҷрқҹҡрқҹӣрқҹңрқҹқрқҹһрқҹҹрқҹ рқҹЎ',
    script:'рқ’ңв„¬рқ’һрқ’ҹв„°в„ұрқ’ўв„Ӣв„җрқ’Ҙрқ’Ұв„’в„ірқ’©рқ’Әрқ’«рқ’¬в„ӣрқ’®рқ’Ҝрқ’°рқ’ұрқ’Ірқ’ірқ’ҙрқ’өрқ’¶рқ’·рқ’ёрқ’№в„Ҝрқ’»в„Ҡрқ’Ҫрқ’ҫрқ’ҝрқ“Җрқ“Ғрқ“Ӯрқ“ғв„ҙрқ“…рқ“Ҷрқ“Үрқ“Ҳрқ“үрқ“Ҡрқ“Ӣрқ“Ңрқ“Қрқ“Һрқ“Ҹ0123456789',
    mono:'рқҷ°рқҷұрқҷІрқҷірқҷҙрқҷөрқҷ¶рқҷ·рқҷёрқҷ№рқҷәрқҷ»рқҷјрқҷҪрқҷҫрқҷҝрқҡҖрқҡҒрқҡӮрқҡғрқҡ„рқҡ…рқҡҶрқҡҮрқҡҲрқҡүрқҡҠрқҡӢрқҡҢрқҡҚрқҡҺрқҡҸрқҡҗрқҡ‘рқҡ’рқҡ“рқҡ”рқҡ•рқҡ–рқҡ—рқҡҳрқҡҷрқҡҡрқҡӣрқҡңрқҡқрқҡһрқҡҹрқҡ рқҡЎрқҡўDetailedрқҹ¶рқҹ·рқҹёрқҹ№рқҹ¶рқҹ»рқҹјрқҹҪрқҹҫрқҹҝ'
  };
  const normal='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  function convertToUnicode(str,mapStr){
    const normalArr=Array.from(normal);
    const mapArr=Array.from(mapStr);
    return Array.from(str).map(char=>{
      const idx=normalArr.indexOf(char);
      return idx!==-1&&mapArr[idx]?mapArr[idx]:char;
    }).join('');
  }
  function generateStyles(){
    const input=document.getElementById('inputText').value;
    const grid=document.getElementById('fancyGrid');
    grid.innerHTML='';
    if(!input)return;
    const styles=[
      {name:'Bold Serif',map:maps.bold},
      {name:'Double Struck',map:maps.doubleStruck},
      {name:'Cursive Script',map:maps.script},
      {name:'Monospace',map:maps.mono}
    ];
    styles.forEach(s=>{
      const converted=convertToUnicode(input,s.map);
      const row=document.createElement('div');
      row.className='fancy-row';
      row.innerHTML=`<div><div style="font-size:.8rem;color:var(--tx2);margin-bottom:4px">${s.name}</div><div class="fancy-text-val">${converted}</div></div><button class="btn-secondary" style="padding:6px 12px;font-size:.8rem" onclick="copyToClipboard('${converted.replace(/'/g,"\\'")}',this)">Copy</button>`;
      grid.appendChild(row);
    });
  }
  generateStyles();
  </script>
